name: Release (Manual)

on:
  workflow_dispatch:

jobs:
  node-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Test shared
        run: npm test -w packages/shared

      - name: Build web
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
        run: npm run build -w apps/web

      - name: Lint web
        run: npm run lint -w apps/web

      - name: Build extension
        run: npm run build -w apps/extension

      - name: Zip extension dist
        run: |
          cd apps/extension/dist
          zip -qr ../../extension-release.zip .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-release
          path: apps/extension/extension-release.zip

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run API tests
        env:
          # Dummy values so tests don't require real secrets.
          JWT_SECRET: test
          APP_ORIGIN: http://localhost:3000
          DATABASE_URL: sqlite+pysqlite:///:memory:
        run: |
          cd apps/api
          python -m pytest -q

