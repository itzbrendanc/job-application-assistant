name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web_extension_shared:
    name: Web + Extension + Shared (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Test shared
        run: npm test -w packages/shared

      - name: Lint web
        run: npm run lint -w apps/web

      - name: Build web
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build -w apps/web

      - name: Build extension
        run: npm run build -w apps/extension

  api_tests:
    name: API Tests (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d appdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run pytest
        env:
          APP_ENV: ci
          APP_ORIGIN: http://localhost:3000
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/appdb
          JWT_ISSUER: job-app-assistant
          JWT_AUDIENCE: job-app-assistant-web
          JWT_SECRET: ci-not-a-secret
          AI_PROVIDER: stub
          AI_API_KEY: ""
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          STRIPE_PRICE_PRO_MONTHLY: price_dummy_monthly
          STRIPE_PRICE_PRO_ANNUAL: price_dummy_annual
        run: pytest -q apps/api/tests

