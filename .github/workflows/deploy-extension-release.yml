name: Build Extension Release Artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build extension
        run: npm run build -w apps/extension

      - name: Zip dist
        run: |
          cd apps/extension/dist
          zip -qr ../../extension-release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-release
          path: apps/extension/extension-release.zip

