name: Deploy API (Render Hook + Migrations)

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run Alembic migrations before triggering deploy"
        type: boolean
        required: true
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run API tests
        env:
          JWT_SECRET: test
          APP_ORIGIN: http://localhost:3000
          DATABASE_URL: sqlite+pysqlite:///:memory:
        run: |
          cd apps/api
          python -m pytest -q

  migrate_and_deploy:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run migrations (optional)
        if: ${{ inputs.run_migrations }}
        env:
          DATABASE_URL: ${{ secrets.API_DATABASE_URL }}
        run: |
          cd apps/api
          alembic upgrade head

      - name: Trigger Render deploy hook
        env:
          RENDER_API_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_API_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret RENDER_API_DEPLOY_HOOK_URL"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_API_DEPLOY_HOOK_URL"

